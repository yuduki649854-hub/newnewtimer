<style>

html, body {
  margin: 0;
  padding: 0;
  background: #f3f4f6;
  font-family: Arial, sans-serif;
  overscroll-behavior: none;
  touch-action: manipulation;
}

body {
  padding: 16px;
  box-sizing: border-box;
}

/* ヘッダー全体を両端揃えにするためのコンテナ (iPadの幅に綺麗に収まるよう調整) */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  width: 100%;
  box-sizing: border-box;
  gap: 8px; /* 要素同士の隙間を少し詰めました */
}

/* ボタンサイズをiPadの幅に合わせて少しスリムに調整 */
.settings-button {
  width: 48px;
  height: 48px;
  border: none;
  border-radius: 50%;
  background: white;
  font-size: 22px;
  cursor: pointer;
  box-shadow: 0 3px 8px rgba(0,0,0,0.12);
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}

/* ステータス要素を横いっぱいに広げて両端を揃える */
.status-bar {
  display: flex;
  flex-direction: row;
  align-items: center;
  flex-grow: 1;
  justify-content: flex-start;
  gap: 8px; /* 隙間を微調整 */
}

/* 各ステータスの高さをiPadの幅に合わせて少しスリムに調整 */
.status-bar div, #nextWaitTime, .waiting-controls, .mail-controls {
  background: white;
  height: 48px;
  box-sizing: border-box;
  display: flex;
  align-items: center;
  border-radius: 999px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.status-bar div, #nextWaitTime {
  padding: 0 12px; /* はみ出さないように左右の余白を少し調整 */
  font-weight: bold;
  font-size: 15px; /* 文字サイズをiPadに最適化 */
  white-space: nowrap;
}

.waiting-controls, .mail-controls {
  padding: 0 4px;
  gap: 4px;
}

/* 待ちボタンの余白をリセット（次の待ち時間と密着させるため） */
.waiting-controls {
  margin-right: 0;
}

/* 次の待ち時間の右側に大きな余白を作ることで、左側の3つを一塊にして左寄せにする */
#nextWaitTime {
  margin-right: auto;
}

/* 移動中のコントロールの余白をリセット */
.mail-controls {
  margin-right: 0;
}

/* コントロール内のボタンも横幅に収まるよう微調整 */
.waiting-controls button, .mail-controls button {
  height: 38px;
  font-size: 14px;
  font-weight: bold;
  border: none;
  border-radius: 999px;
  cursor: pointer;
  padding: 0 12px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  box-sizing: border-box;
}

.waiting-controls button.circle-btn, .mail-controls button.circle-btn {
  width: 38px;
  padding: 0;
  border-radius: 50%;
  font-size: 20px;
}

.waiting-controls button {
  background: #e5e7eb;
  color: #2563eb;
}
.waiting-controls button:active { background: #d1d5db; }

.btn-mail-sent { background: #ffedd5; color: #ea580c; }
.btn-mail-cancel { background: #fee2e2; color: #dc2626; }

/* 看板を右端に寄せてきれいに収める */
.call-guide-banner {
  background: #f0fdf4;
  border: 2px dashed #16a34a;
  color: #166534;
  font-size: 15px;
  font-weight: bold;
  padding: 0 12px;
  border-radius: 999px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.06);
  display: flex;
  align-items: center;
  height: 48px;
  box-sizing: border-box;
  flex-grow: 1;
  justify-content: center;
  max-width: 240px;
}
.call-guide-banner.highlight {
  background: #fff7ed;
  border-color: #f97316;
  color: #c2410c;
  animation: pulseBg 2s infinite;
}
@keyframes pulseBg {
  0% { transform: scale(1); }
  50% { transform: scale(1.01); }
  100% { transform: scale(1); }
}

.settings {
  display: none;
  background: white;
  border-radius: 20px;
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.group-card {
  background: #f5f5f5;
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 12px;
}

.group-card h3 {
  margin-top: 0;
  margin-bottom: 8px;
}

.group-inputs {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
}

.group-inputs input {
  width: 60px;
  padding: 6px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* 📱 1列に4個がきれいに収まるグリッド設定（中央揃えを追加） */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  width: 100%;
  justify-content: center; /* 残ったタイマーカードが真ん中にくるように変更 */
}

/* タイマーカードのサイズ調整 */
.timer-card {
  border-radius: 16px;
  padding: 14px 12px;
  color: white;
  box-shadow: 0 3px 8px rgba(0,0,0,0.12);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-height: 175px;
}

.timer-title {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 4px;
}

.time {
  font-size: 44px;
  text-align: center;
  margin-bottom: 8px;
  font-weight: bold;
}

.buttons {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.timer-card button {
  border: none;
  border-radius: 12px;
  padding: 10px 4px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

.five-btn {
  background: rgba(255,255,255,0.85);
}

.clear-btn {
  background: rgba(0,0,0,0.7);
  color: white;
}

.blink-red {
  animation: blinkRed 1s infinite;
}

@keyframes blinkRed {
  0% { background: #E10F0F; }
  50% { background: #FFFFFF; color: #E10F0F; }
  100% { background: #E10F0F; }
}

.blink-yellow{
  animation: blinkYellow 1s infinite;
}

@keyframes blinkYellow{
  0%{ background:#FFE11E; color:black; }
  50%{ background:white; color:#FFE11E; }
  100%{ background:#FFE11E; color:black; }
}

.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: 9999;
}

.modal-content {
  background: white;
  width: 90%;
  max-width: 400px;
  margin: 40px auto;
  padding: 16px;
  border-radius: 16px;
  color: black;
  box-shadow: 0 8px 20px rgba(0,0,0,0.25);
}

.modal-content h2 {
  margin-top: 0;
  font-size: 20px;
}

.calc-display-box {
  background: #f3f4f6;
  border-radius: 12px;
  padding: 10px;
  font-size: 24px;
  font-weight: bold;
  color: #1f2937;
  margin-bottom: 12px;
  display: inline-block;
  min-width: 100px;
  text-align: center;
  border: 2px solid #e5e7eb;
}

.calc-result {
  font-size: 28px;
  font-weight: bold;
  color: #2563eb;
  margin: 8px 0;
}

</style>
</head>

<script>

let stats = JSON.parse(localStorage.getItem('stats')) || { totalGroups: 0, totalPeople: 0, hourly: {} };

const INITIAL_SECONDS = 30 * 60;

let waitingList = JSON.parse(localStorage.getItem('waitingList')) || [];
let waitingCount = waitingList.length;

let transitHistory = JSON.parse(localStorage.getItem('transitHistory')) || [];

const timers = JSON.parse(localStorage.getItem('timers')) || [];

const groups = JSON.parse(localStorage.getItem('groups')) || {
  red: { start: 1, end: 5, color: '#FF5D52' },
  yellow: { start: 6, end: 9, color: '#FFA703' },
  green: { start: 10, end: 14, color: '#4CAF50' },
  blue: { start: 15, end: 17, color: '#3143FF' }
};

let currentAction = null; 
let currentTargetTimer = null;

let calcInputString = "1";
let isFirstInput = true; 

function getMailCallAvailableCount() {
  const stopped = timers.filter(t => !t.running).length;
  const twentyMinutes = timers.filter(t => t.running && t.seconds <= 1200).length;
  let currentTransitCount = transitHistory.length;
  return (stopped + twentyMinutes) - (waitingCount + currentTransitCount);
}

function saveGroups() {
  localStorage.setItem('groups', JSON.stringify(groups));
  updateButtonColors();
}

function saveTimers() {
  localStorage.setItem('timers', JSON.stringify(timers));
}

function getButtonColor(index) {
  for (const key in groups) {
    const group = groups[key];
    if (index >= group.start && index <= group.end) {
      return group.color;
    }
  }
  return '#999';
}

function updateButtonColors() {
  for (let i = 1; i <= 17; i++) {
    const button = document.getElementById(`start-${i}`);
    if (button) {
      button.style.background = getButtonColor(i);
    }
  }
}

function getTimerColor(timer) {
  if (!timer.running && timer.seconds === INITIAL_SECONDS) {
    return '#4AB3E0';
  }
  if (timer.seconds < 60 && timer.voiceChecked) {
    return '#E10F0F';
  }
  if (timer.seconds <= 360 && timer.seconds >= 60 && timer.acknowledged) {
    return '#FFE11E';
  }
  return '#9E9E9E';
}

function formatTime(seconds) {
  const abs = Math.abs(seconds);
  const mins = String(Math.floor(abs / 60)).padStart(2, '0');
  const secs = String(abs % 60).padStart(2, '0');
  return seconds < 0 ? `-${mins}:${secs}` : `${mins}:${secs}`;
}

function createTimers() {
  const grid = document.getElementById('timerGrid');

  if (timers.length === 0) {
    for (let i = 1; i <= 17; i++) {
      timers.push({
        id: i,
        seconds: INITIAL_SECONDS,
        running: false,
        acknowledged: false,
        voiceChecked: false,
        startedAt: null,
        endAt: null
      });
    }
    saveTimers();
  }

  timers.sort((a,b)=>b.id-a.id);

  timers.forEach(timer => {
    const card = document.createElement('div');
    card.className = 'timer-card';
    card.id = `card-${timer.id}`;

    card.innerHTML = `
      <div class="timer-title">No.${timer.id}</div>
      <div class="time" id="time-${timer.id}">30:00</div>
      <div class="buttons">
        <button id="start-${timer.id}" style="background:${getButtonColor(timer.id)}; color:white;">
          ${timer.id}
        </button>
        <button class="five-btn" id="five-${timer.id}">声かけ済</button>
        <button class="clear-btn" id="clear-${timer.id}">クリア</button>
      </div>
    `;

    grid.appendChild(card);

    document.getElementById(`start-${timer.id}`).onclick = () => {
      if (timer.running) return;

      if (waitingList.length > 0) {
        const peopleCount = waitingList.shift();
        waitingCount = waitingList.length;
        localStorage.setItem('waitingList', JSON.stringify(waitingList));
        localStorage.setItem('waitingCount', waitingCount);
        startTimerWithPeople(timer, peopleCount);
      } else {
        currentAction = 'directStart';
        currentTargetTimer = timer;
        document.getElementById('peopleModalTitle').textContent = `No.${timer.id} の体験人数`;
        document.getElementById('peopleModal').style.display = 'block';
      }
    };

    document.getElementById(`five-${timer.id}`).onclick = () => {
      if (!timer.running) return;
      if (timer.seconds < 60) {
        timer.voiceChecked = true;
      } else if (timer.seconds <= 360) {
        timer.acknowledged = true;
      }
      saveTimers();
      updateCard(timer);
    };

    document.getElementById(`clear-${timer.id}`).onclick = () => {
      timer.running = false;
      timer.seconds = INITIAL_SECONDS;
      timer.acknowledged = false;
      timer.voiceChecked = false;
      timer.startedAt = null;
      timer.endAt = null;
      saveTimers();
      sortTimers();
      updateCard(timer);
    };

    updateCard(timer);
  });

  sortTimers();
}

function startTimerWithPeople(timer, peopleCount) {
  timer.running = true;

  const nowHour = new Date().getHours();
  stats.totalGroups = (stats.totalGroups || 0) + 1;
  stats.totalPeople = (stats.totalPeople || 0) + peopleCount;
  if (!stats.hourly[nowHour]) {
    stats.hourly[nowHour] = { groups: 0, people: 0 };
  }
  stats.hourly[nowHour].groups++;
  stats.hourly[nowHour].people += peopleCount;
  localStorage.setItem('stats', JSON.stringify(stats));

  timer.startedAt = Date.now();
  timer.endAt = Date.now() + (timer.seconds * 1000);

  sortTimers();
  saveTimers();
  updateCard(timer);
}

function selectPeople(num) {
  if (currentAction === 'addWaiting') {
    waitingList.push(num);
    waitingCount = waitingList.length;
    localStorage.setItem('waitingList', JSON.stringify(waitingList));
    localStorage.setItem('waitingCount', waitingCount);
    if (transitHistory.length > 0) {
      transitHistory.shift();
      localStorage.setItem('transitHistory', JSON.stringify(transitHistory));
    }
  } else if (currentAction === 'directStart' && currentTargetTimer) {
    startTimerWithPeople(currentTargetTimer, num);
    if (transitHistory.length > 0) {
      transitHistory.shift();
      localStorage.setItem('transitHistory', JSON.stringify(transitHistory));
    }
  }
  
  document.getElementById('peopleModal').style.display = 'none';
  currentAction = null;
  currentTargetTimer = null;
  updateStatusCounts();
}

function sortTimers() {
  const grid = document.getElementById('timerGrid');
  const cards = Array.from(document.querySelectorAll('.timer-card'));
  const runningCards = cards.filter(c => {
    const id = Number(c.id.replace('card-', ''));
    const t = timers.find(timer => timer.id === id);
    return t.running;
  });
  const stoppedCards = cards.filter(c => {
    const id = Number(c.id.replace('card-', ''));
    const t = timers.find(timer => timer.id === id);
    return !t.running;
  });
  runningCards.sort((a,b)=>{
    const aId = Number(a.id.replace('card-', ''));
    const bId = Number(b.id.replace('card-', ''));
    const aTimer = timers.find(t=>t.id===aId);
    const bTimer = timers.find(t=>t.id===bId);
    return aTimer.startedAt - bTimer.startedAt;
  });
  stoppedCards.sort((a,b)=>{
    const aId = Number(a.id.replace('card-', ''));
    const bId = Number(b.id.replace('card-', ''));
    return bId - aId;
  });
  [...runningCards, ...stoppedCards].forEach(card=>{
    grid.appendChild(card);
  });
}

function updateCard(timer) {
  const card = document.getElementById(`card-${timer.id}`);
  const time = document.getElementById(`time-${timer.id}`);
  card.classList.remove('blink-yellow', 'blink-red');

  if (timer.seconds <= 360 && timer.seconds >= 60 && !timer.acknowledged) {
    card.classList.add('blink-yellow');
  } else if (timer.seconds < 60 && !timer.voiceChecked) {
    card.classList.add('blink-red');
  } else {
    card.style.background = getTimerColor(timer);
  }

  time.textContent = formatTime(timer.seconds);
}

function updateStatusCounts() {
  let currentTransitCount = transitHistory.length;

  document.getElementById('waitingCountDisplay').textContent = `待ち ${waitingCount}組`;
  document.getElementById('transitCountDisplay').textContent = `移動中 ${currentTransitCount}組`;

  let mailCallAvailable = getMailCallAvailableCount();
  const guideBanner = document.getElementById('callGuideDisplay');

  if (mailCallAvailable > 0) {
    guideBanner.textContent = `✉️：【 ${mailCallAvailable}組 】呼び出し！`;
    guideBanner.classList.add('highlight');
  } else {
    guideBanner.textContent = `✉️：待機中`;
    guideBanner.classList.remove('highlight');
  }

  const activeTimers = timers
    .filter(t => t.running && t.seconds > 0)
    .sort((a,b) => a.seconds - b.seconds);
  let nextWaitMinutes = 0;
  const stopped = timers.filter(t => !t.running).length;
  if (waitingCount > 0 || (stopped === 0 && activeTimers.length > 0)) {
    if (activeTimers.length === 0) {
      nextWaitMinutes = 0;
    } else {
      const cycle = Math.floor(waitingCount / activeTimers.length);
      const position = waitingCount % activeTimers.length;
      const waitSeconds = activeTimers[position].seconds + (cycle * 1800);
      nextWaitMinutes = Math.ceil(waitSeconds / 60);
    }
  } else {
    nextWaitMinutes = 0;
  }

  document.getElementById('nextWaitTime').textContent = `次の待ち時間 : ${nextWaitMinutes}分`;
}

function calculateCustomWait(targetCount) {
  const stopped = timers.filter(t => !t.running).length;
  if (stopped >= targetCount) {
    return 0;
  }
  const activeTimers = timers
    .filter(t => t.running && t.seconds > 0)
    .sort((a,b) => a.seconds - b.seconds);
  if (activeTimers.length === 0) {
    return 0;
  }
  const effectiveWaitCount = targetCount - stopped - 1;
  const cycle = Math.floor(effectiveWaitCount / activeTimers.length);
  const position = effectiveWaitCount % activeTimers.length;
  const waitSeconds = activeTimers[position].seconds + (cycle * 1800);
  return Math.ceil(waitSeconds / 60);
}

setInterval(()=>{
  const now = Date.now();

  timers.forEach(timer=>{
    if (timer.running) {
      timer.seconds = Math.floor((timer.endAt - now) / 1000);
      updateCard(timer);
    }
  });
  saveTimers();

  let expiredCount = 0;
  transitHistory = transitHistory.filter(timestamp => {
    const elapsedSeconds = (now - timestamp) / 1000;
    if (elapsedSeconds >= 1800) {
      expiredCount++;
      return false; 
    }
    return true;
  });
  

  if (expiredCount > 0) {
    localStorage.setItem('transitHistory', JSON.stringify(transitHistory));

function bindGroupSettings(name) {
  document.getElementById(`${name}-start`).value = groups[name].start;
  document.getElementById(`${name}-end`).value = groups[name].end;
  document.getElementById(`${name}-color`).value = groups[name].color;

  document.getElementById(`${name}-start`).oninput = (e)=>{
    groups[name].start = Number(e.target.value);
    saveGroups();
  };
  document.getElementById(`${name}-end`).oninput = (e)=>{
    groups[name].end = Number(e.target.value);
    saveGroups();
  };
  document.getElementById(`${name}-color`).oninput = (e)=>{
    groups[name].color = e.target.value;
    saveGroups();
  };
}

};

document.getElementById('sendMailAction').onclick = () => {
  let mailCallAvailable = getMailCallAvailableCount();
  let sendCount = mailCallAvailable > 0 ? mailCallAvailable : 1;
  const now = Date.now();
  for (let i = 0; i < sendCount; i++) {
    transitHistory.push(now);
  }

  localStorage.setItem('transitHistory', JSON.stringify(transitHistory));
  updateStatusCounts();
};
document.getElementById('cancelMailAction').onclick = () => {
  if (transitHistory.length > 0) {
    transitHistory.shift();
    localStorage.setItem('transitHistory', JSON.stringify(transitHistory));
    updateStatusCounts();
  }
};

document.getElementById('statsButton').onclick = () => {
  const statsContent = document.getElementById('statsContent');
  let html = `
    <p><strong>累計:</strong> ${stats.totalGroups || 0} 組 / ${stats.totalPeople || 0} 人</p>
    <p style="font-size:13px; color:#666;">（1組あたりの平均: ${stats.totalGroups ? Math.round((stats.totalPeople / stats.totalGroups) * 10) / 10 : 0} 人）</p>
    <hr>
    <h3>時間帯別の集計</h3>
    <table style="width:100%; border-collapse: collapse; margin-top:8px; font-size:14px;">
      <thead>
        <tr style="background:#eee; text-align:left;">
          <th style="padding:6px; border:1px solid #ccc;">時間帯</th>
          <th style="padding:6px; border:1px solid #ccc;">組数</th>
          <th style="padding:6px; border:1px solid #ccc;">人数</th>
        </tr>
      </thead>
      <tbody>
  `;

  let hasData = false;
  for (let h = 0; h < 24; h++) {
    const data = stats.hourly[h];
    if (data) {
      hasData = true;
      const gCount = typeof data === 'number' ? data : (data.groups || 0);
      const pCount = typeof data === 'number' ? data * 2 : (data.people || 0);
      html += `
        <tr>
          <td style="padding:6px; border:1px solid #ccc;">${h}時 〜 ${h+1}時</td>
          <td style="padding:6px; border:1px solid #ccc;">${gCount} 組</td>
          <td style="padding:6px; border:1px solid #ccc;">${pCount} 人</td>
        </tr>
      `;
    }
  }

  if (!hasData) {
    html += `<tr><td colspan="3" style="padding:6px; border:1px solid #ccc; text-align:center; color:#999;">本日のデータはありません</td></tr>`;
  }

  html += `
      </tbody>
    </table>
    <button id="resetStats" style="background:#ff4d4d; color:white; margin-top:16px; width:100%; padding:8px; border-radius:8px; font-weight:bold; cursor:pointer;">
      データをリセットする
    </button>
  `;
  statsContent.innerHTML = html;

  document.getElementById('resetStats').onclick = () => {
    if (confirm('集計データをすべてリセットしますか？')) {
      stats = { totalGroups: 0, totalPeople: 0, hourly: {} };
      localStorage.setItem('stats', JSON.stringify(stats));
      document.getElementById('statsButton').click();
    }
  };

  document.getElementById('statsModal').style.display = 'block';
};

}

function pressCalcNum(num) {
  if (isFirstInput) {
    calcInputString = String(num);
    isFirstInput = false;
  } else {
    if (calcInputString === "0") {
      calcInputString = String(num);
    } else {
      if (calcInputString.length < 3) {
        calcInputString += String(num);
      }
    }
  }
  updateCalcScreen();
}

function clearCalcNum() {
  calcInputString = "0";
  isFirstInput = false;
  updateCalcScreen();
}

function backspaceCalcNum() {
  isFirstInput = false;
  if (calcInputString.length > 1) {
    calcInputString = calcInputString.slice(0, -1);
  } else {
    calcInputString = "0";
  }
  updateCalcScreen();
}
